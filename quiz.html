     w：流派权重（结果主依据）。 dx：改良(−) ↔ 革命(+)。 dy：同一/普遍(−) ↔ 差异/多元(+)。
     权重力求贴合各流派的真实理论立场；敏感议题（跨性别、性工作、面纱等）中立并列各方。 */
  var Q=[
    {t:'如果只能指出一个压迫女性<b>最根本</b>的根源，你会选——',
     o:[{t:'法律与制度上仍未真正平等。',w:{liberal:3},dx:-2,dy:-1},
        {t:'父权制本身——一套男性支配的性别秩序。',w:{radical:3},dx:1,dy:-1},
        {t:'资本主义与父权合谋，阶级与经济才是关键。',w:{marxist:3},dx:2},
        {t:'多重压迫的交织，没有单一根源。',w:{intersectional:3},dx:1,dy:1},
        {t:'一种"支配万物"的逻辑，既统治女性也征服自然。',w:{eco:3},dx:1,dy:1}]},
    {t:'"女性"这一身份，最应由什么来界定？',
     o:[{t:'生理性别，以及作为女孩长大的共同经验。',w:{radical:3},dy:-2},
        {t:'一个人真诚的自我性别认同。',w:{postmodern:4},dy:2},
        {t:'根本不存在单一的"女性"，它因处境而异。',w:{intersectional:2,postmodern:1},dy:2}]},
    {t:'你心中"理想的平等"更接近——',
     o:[{t:'女性获得与男性<b>完全一样</b>的权利与对待。',w:{liberal:3},dy:-2},
        {t:'被贬低的"女性特质"（关怀·连结）被重新<b>珍视</b>。',w:{cultural:4},dy:2},
        {t:'不再以任何固定的"男/女"标准来衡量人。',w:{postmodern:3},dy:2}]},
    {t:'推动改变，你<b>最信任</b>的路径是——',
     o:[{t:'在体制内修法、改政策、提升女性参政与就业。',w:{liberal:3},dx:-2,dy:-1},
        {t:'提高意识、组织集体行动，从根本上改造结构。',w:{radical:3},dx:2},
        {t:'把性别斗争和反资本、反殖民的斗争结合。',w:{marxist:2,intersectional:1},dx:2},
        {t:'在日常语言与文化里，瓦解"男/女"二元。',w:{postmodern:3},dx:1,dy:1}]},
    {t:'一位女性当上了大公司 CEO——',
     o:[{t:'实打实的进步，玻璃天花板被打破，值得庆祝。',w:{liberal:3},dx:-1},
        {t:'要看她是否复制了压迫："进入"旧体系不等于"胜利"。',w:{radical:1,marxist:2},dx:2},
        {t:'对流水线上的女工来说，这几乎毫无意义。',w:{marxist:3},dx:1}]},
    {t:'对"我的偏好就是我自由意志的体现"这句话，你——',
     o:[{t:'认同：尊重一个人对自身体验的最终陈述，是底线。',w:{liberal:2,postmodern:1},dx:-1},
        {t:'怀疑：偏好可能是被规训出的"适应性偏好"。',w:{radical:2,cultural:1},dx:1}]},
    {t:'她说"戴头巾是我自愿的虔诚"，而一位西方学者称那是压迫。你更认同——',
     o:[{t:'若某做法压迫女性，文化或信仰都不能成为豁免理由。',w:{liberal:2,radical:1},dx:-1,dy:-1},
        {t:'用单一标准评判她本身就是傲慢——该由她自己定义自由。',w:{intersectional:2,faith:2},dy:2},
        {t:'信仰与女性主义不冲突，可以从传统<b>内部</b>争取平等。',w:{faith:4},dx:-1,dy:1}]},
    {t:'对<b>性工作</b>，你的立场更接近——',
     o:[{t:'它是父权与经济双重剥削的产物，应当被看穿。',w:{radical:3},dx:1,dy:-1},
        {t:'在安全与自愿前提下，是女性的身体与劳动自主。',w:{liberal:2,postmodern:2},dx:-1,dy:1},
        {t:'关键要问：是谁、在什么处境下"被迫自愿"？',w:{marxist:2,intersectional:1},dx:1,dy:1}]},
    {t:'谈"女性受压迫"时，你<b>最先</b>想到的是——',
     o:[{t:'法律与职场中仍存在的不平等。',w:{liberal:3},dx:-1,dy:-1},
        {t:'全球供应链最底层的女工。',w:{marxist:3},dx:1},
        {t:'被种族·阶级·身份多重边缘化的女性。',w:{intersectional:3},dy:2},
        {t:'不同文化与信仰中，女性自己未被听见的声音。',w:{faith:2,intersectional:1},dy:2}]},
    {t:'"人对自然的征服"与"男性对女性的支配"，是同一种逻辑吗？',

  app.addEventListener('click',function(e){
    var el=e.target.closest('[data-i],[data-act]'); if(!el) return;
    if(el.hasAttribute('data-i')){
      if(el.classList.contains('sel')) return;
      Array.prototype.forEach.call(el.parentNode.querySelectorAll('.q-opt'),function(o){ o.style.pointerEvents='none'; });

      var ix=parseInt(el.getAttribute('data-i'),10);
      setTimeout(function(){ choose(ix); },360);

    if(act==='start'){ idx=0; answers=[]; renderQ(); }

    else if(act==='back') back();
    else if(act==='restart'){ idx=0; answers=[]; resetScores(); renderIntro(); }
